<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Glow Ring Gradient -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    
    <!-- Code Highlight Gradient -->
    <linearGradient id="code-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.8" />
    </linearGradient>

    <!-- Silhouette Gradient -->
    <linearGradient id="user-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <!-- Drop Shadows and Glows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Circle -->
  <circle cx="250" cy="250" r="230" fill="url(#bg-grad)" stroke="#312e81" stroke-width="2" />

  <!-- Abstract Tech Grid Lines -->
  <g stroke="#3730a3" stroke-width="1" opacity="0.3">
    <!-- Horizontal lines -->
    <line x1="50" y1="150" x2="450" y2="150" />
    <line x1="30" y1="250" x2="470" y2="250" />
    <line x1="50" y1="350" x2="450" y2="350" />
    <!-- Vertical lines -->
    <line x1="150" y1="50" x2="150" y2="450" />
    <line x1="250" y1="30" x2="250" y2="470" />
    <line x1="350" y1="50" x2="350" y2="450" />
  </g>

  <!-- Concentric Orbit Circles -->
  <circle cx="250" cy="250" r="190" fill="none" stroke="#4338ca" stroke-width="1.5" stroke-dasharray="10 15" opacity="0.5" />
  <circle cx="250" cy="250" r="160" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="5 5" opacity="0.4" />

  <!-- Code Bracket Symbols (Background Accent) -->
  <text x="70" y="270" font-family="'Courier New', monospace" font-size="70" fill="url(#code-grad)" font-weight="bold" opacity="0.25">&lt;</text>
  <text x="380" y="270" font-family="'Courier New', monospace" font-size="70" fill="url(#code-grad)" font-weight="bold" opacity="0.25">&gt;</text>
  <text x="215" y="100" font-family="'Courier New', monospace" font-size="24" fill="#00f2fe" font-weight="bold" opacity="0.3">{ code }</text>

  <!-- Glowing Orbiting Nodes -->
  <circle cx="150" cy="100" r="5" fill="#00f2fe" filter="url(#glow)" />
  <line x1="150" y1="100" x2="180" y2="140" stroke="#00f2fe" stroke-width="1" opacity="0.5" />
  
  <circle cx="360" cy="120" r="7" fill="#7c3aed" filter="url(#glow)" />
  <line x1="360" y1="120" x2="320" y2="160" stroke="#7c3aed" stroke-width="1" opacity="0.5" />
  
  <circle cx="100" cy="320" r="6" fill="#7c3aed" filter="url(#glow)" />
  <line x1="100" y1="320" x2="150" y2="330" stroke="#7c3aed" stroke-width="1" opacity="0.5" />
  
  <circle cx="390" cy="340" r="5" fill="#00f2fe" filter="url(#glow)" />

  <!-- Outer Neon Glow Ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="url(#glow-grad)" stroke-width="4" filter="url(#glow)" />

  <!-- Styled Developer Silhouette -->
  <!-- Shoulders / Torso -->
  <path d="M 120 440 C 120 370, 160 340, 250 340 C 340 340, 380 370, 380 440 Z" fill="url(#user-grad)" />
  <!-- Neck -->
  <rect x="230" y="295" width="40" height="50" rx="10" fill="#cbd5e1" />
  <!-- Head -->
  <circle cx="250" cy="230" r="75" fill="url(#user-grad)" />
  
  <!-- Hair / Styled Cut -->
  <path d="M 175 230 C 175 160, 230 145, 275 145 C 310 145, 325 165, 325 190 C 325 210, 320 220, 325 230 C 315 220, 310 215, 300 220 C 290 200, 270 195, 260 205 C 240 195, 220 200, 210 215 C 200 205, 185 210, 175 230 Z" fill="#1e293b" />
  
  <!-- Modern Glasses -->
  <g stroke="#00f2fe" stroke-width="3" fill="none" filter="url(#glow)">
    <!-- Left frame -->
    <rect x="205" y="215" width="35" height="22" rx="6" fill="rgba(0, 242, 254, 0.1)" />
    <!-- Right frame -->
    <rect x="260" y="215" width="35" height="22" rx="6" fill="rgba(0, 242, 254, 0.1)" />
    <!-- Bridge -->
    <line x1="240" y1="225" x2="260" y2="225" />
    <!-- Sides -->
    <path d="M 205 225 C 195 225, 185 220, 180 225" />
    <path d="M 295 225 C 305 225, 315 220, 320 225" />
  </g>

  <!-- Glowing Laptop Light Reflection (Glow from below) -->
  <path d="M 160 440 L 340 440 L 300 390 L 200 390 Z" fill="url(#code-grad)" opacity="0.3" filter="url(#glow)" />
  
  <!-- Floating Binary/Code Fragments -->
  <text x="120" y="160" font-family="monospace" font-size="12" fill="#00f2fe" opacity="0.6">0101</text>
  <text x="320" y="290" font-family="monospace" font-size="12" fill="#7c3aed" opacity="0.6">1010</text>
  <text x="160" y="320" font-family="monospace" font-size="11" fill="#94a3b8" opacity="0.4">print()</text>
  <text x="290" y="180" font-family="monospace" font-size="11" fill="#94a3b8" opacity="0.4">fit()</text>

</svg>
